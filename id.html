<!DOCTYPE html>
<html lang="pl">
<head>
    <title>mObywatel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/id.css?v=1.5">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="icon" type="image/x-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="shortcut icon" href="https://i.imgur.com/U7TRg0V.png">

    <meta name="theme-color" content="#121212">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <div class="background"></div>
    <div class="top_grid">
        <img class="logo" src="https://i.imgur.com/30pODeI.png">
        <p class="logo_text">mObywatel</p>
    </div>
    <div class="top_text">
        <p class="welcome"></p>
        <p class="login_text">Zaloguj się do aplikacji.</p>
    </div>
    <div class="password_box">
        <div class="password_grid">
            <p class="password_text">Hasło</p>
            <div class="input_holder">
                <input type="password" class="password_input">
                <div class="eye"></div>
            </div>
            <p class="forgot_password">Nie pamiętasz hasła?</p>
        </div>
    </div>
    <div class="bottom">
        <p class="login" id="submitLogin">Zaloguj się</p>

        <div class="data">
            <img class="logo_other" style="height: 70px; width: 430px" src="IMG_4756.png">
        </div>
        <div>
            <p class="version" style="text-align: center;">wersja 4.71.0 (5323)</p>
        </div>
    </div>

    <script src="assets/id.js?v=1.1"></script>
    <script src="assets/manifest.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('submitLogin');
            if (loginBtn) {
                // Klonujemy przycisk, aby usunąć domyślne akcje ze starego id.js kierujące na main.html
                const newLoginBtn = loginBtn.cloneNode(true);
                loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);

                newLoginBtn.addEventListener('click', () => {
                    // Pobieramy parametry URL (imię, nazwisko, PESEL itp.) odebrane z aplikacja2.html
                    const currentParams = window.location.search;
                    
                    // Przekierowujemy do poprawnego pliku mobywatel.html przekazując parametry
                    window.location.href = `home.html${currentParams}`;
                });
            }
        });
    </script>
</body>
</html>
