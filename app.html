<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JObywatel - 1.0.</title>
    <style>
        /* Czcionka dla czystości i nowoczesności */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-dark: #09020e;
            --bg-mid: #1c0a27;
            --text-light: #eeeeee;
            --text-subtle: #777777;
            --glass-fill: rgba(255, 255, 255, 0.05);
            --border-clear: rgba(150, 0, 255, 0.3);
            --accent-purple: #9c27b0;
            --accent-glow: rgba(150, 0, 255, 0.6);
            --shadow-button: rgba(150, 0, 255, 0.4);
            --error-red: #ff3333;
            --success-green: #33ff33;
            --accent-blue: #3366ff;
            /* Akcent dla przycisku generowania dat */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top left, var(--bg-mid) 5%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(150, 0, 255, 0.1) 0%, transparent 45%);
            margin-top: 5vh;
        }

        .container {
            /* Głęboki Frosted Glass Effect */
            background: var(--glass-fill);
            backdrop-filter: blur(20px) brightness(1.1);
            -webkit-backdrop-filter: blur(20px) brightness(1.1);

            padding: 30px;
            border-radius: 28px;
            border: 1px solid var(--border-clear);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 20px var(--accent-glow) inset;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--accent-purple);
            border-bottom: 1px solid var(--border-clear);
            padding-bottom: 18px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.2s ease-out;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-subtle);
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        /* AKCENT MROCZNEGO GLOW PRZY FOCUSIE */
        .form-group:focus-within {
            transform: translateY(-2px);
            background-color: rgba(150, 0, 255, 0.05);
            border-radius: 12px;
        }

        .form-group:focus-within label {
            color: var(--accent-purple);
            text-shadow: 0 0 8px var(--accent-purple);
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 16px 14px;
            border: 1px solid var(--border-clear);
            border-radius: 12px;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.5);
            color: var(--text-light);
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 1rem;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: var(--accent-purple);
            outline: none;
            box-shadow: 0 0 0 4px var(--accent-glow);
            background-color: var(--bg-mid);
        }

        ::placeholder {
            color: var(--text-subtle);
            opacity: 0.8;
        }

        /* Dostosowanie pola daty dla lepszej widoczności w ciemnym motywie */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            /* Odwraca kolor ikonki kalendarza na biały */
            cursor: pointer;
        }

        /* --- STYL DLA BLOKU AUTOFILL --- */
        .autofill-block {
            margin-top: -10px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            background-color: rgba(51, 102, 255, 0.05);
            border: 1px solid rgba(51, 102, 255, 0.2);
            box-shadow: 0 0 10px rgba(51, 102, 255, 0.1);
        }

        #autofillButton {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 0;

            background-color: var(--accent-blue);
            color: var(--text-light);
            box-shadow: 0 2px 10px rgba(51, 102, 255, 0.4);
        }

        #autofillButton:hover:not([disabled]) {
            transform: translateY(-1px);
            filter: brightness(1.1);
            box-shadow: 0 4px 15px rgba(51, 102, 255, 0.6);
        }

        #statusMessageAutofill {
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-subtle);
        }

        /* --- KONIEC STYLU DLA BLOKU AUTOFILL --- */


        /* Styl dla głównego przycisku generowania */
        #generateButton {
            width: 100%;
            padding: 18px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-top: 30px;
            margin-bottom: 25px;

            background-color: var(--accent-purple);
            color: var(--text-light);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            box-shadow: 0 4px 20px var(--shadow-button);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            border: 0;
            height: 1px;
            background-color: var(--border-clear);
            margin: 30px 0;
        }

        .footer-dev {
            text-align: center;
            padding-top: 5px;
            font-size: 0.75rem;
            color: var(--text-subtle);
            letter-spacing: 0.5px;
            position: relative;
            width: 100%;
        }

        .footer-dev span {
            display: block;
            color: var(--text-light);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                0 0 20px var(--accent-purple);
            margin-top: 5px;
        }

        /* Sekcja wiadomości/statusu (dla przesłania zdjęcia) */
        #statusMessage {
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
            min-height: 18px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* STYLA DLA WGRYWANIA PLIKU */
        .file-upload-wrapper {
            position: relative;
            display: block;
        }

        #fileInput {
            opacity: 0;
            position: absolute;
            z-index: -1;
            width: 0.1px;
            height: 0.1px;
            overflow: hidden;
        }

        .custom-file-upload {
            display: block;
            width: 100%;
            padding: 16px 14px;
            border: 1px solid var(--border-clear);
            border-radius: 12px;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.5);
            color: var(--text-subtle);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 500;
        }

        .custom-file-upload:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 4px rgba(150, 0, 255, 0.2);
        }

        .image-preview-container {
            width: 100%;
            height: 0;
            opacity: 0;
            border: 1px dashed transparent;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-top: 0;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }

        .image-preview-container.active {
            height: 120px;
            opacity: 1;
            margin-top: 5px;
            border: 1px dashed var(--border-clear);
        }

        #imagePreview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            display: block;
        }

        #imagePreviewContainer.active:hover {
            border-color: var(--accent-purple);
        }

        /* NOWY STYL DLA PRZYCISKU INSTRUKCJA (PODŚWIETLANY) */
        .instruction-details {
            margin-bottom: 25px;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            /* Podstawowy cień dla zamkniętego elementu */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

            justify
