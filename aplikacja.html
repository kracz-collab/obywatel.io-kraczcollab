<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Danych</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-primary: #0B0F19; --bg-secondary: #151D30; --accent-color: #6366F1; --accent-hover: #4F46E5; --text-main: #FFFFFF; --text-muted: #9CA3AF; --error-color: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-primary); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; background: var(--bg-secondary); padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; position: relative; }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 35px; }
        .credits { font-size: 12px; color: var(--text-muted); margin-top: 25px; }
        .credits a { color: var(--accent-color); text-decoration: none; font-weight: 600; }
        .btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #A855F7 0%, #6366F1 100%); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, filter 0.2s; box-shadow: 0 4px 15px rgba(99,102,241,0.3); text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        .btn:active { transform: scale(0.98); filter: brightness(0.9); }
        .btn:disabled { background: #374151; color: #9CA3AF; cursor: not-allowed; box-shadow: none; transform: none; }
        .error-msg { color: var(--error-color); font-size: 14px; margin-top: 15px; font-weight: 600; display: none; }
        .preview-box { width: 100%; max-width: 320px; height: 180px; background: #0B0F19; border-radius: 12px; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 2px dashed #374151; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .section-label { text-align: left; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; padding-left: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="title" id="t-main">Panel Generatora</div>
        <div class="subtitle" id="t-sub">Zarządzanie danymi aplikacji</div>
        
        <div class="section-label">Zdjęcie profilowe</div>
        <div class="preview-box">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" id="avatar-img" alt="Podgląd">
        </div>

        <button class="btn" id="gen-btn">Generuj dane</button>
        <div class="error-msg" id="err-box"></div>

        <div class="credits">
            Made with d🫀 by Jatrogzz<br>
            <a href="https://discord.gg/5Fuy73ynwr" target="_blank">Dołącz do Discorda</a>
        </div>
    </div>

        document.getElementById('gen-btn').addEventListener('click', async () => {
            const btn = document.getElementById('gen-btn');
            const errBox = document.getElementById('err-box');
            
            btn.disabled = true;
            btn.innerText = 'Wczytywanie...';
            errBox.style.display = 'none';

            try {
                // Wywołanie akcji generowania danych (Supabase)
                if (typeof generujDaneAplikacji === 'function') {
                    await generujDaneAplikacji();
                }
                alert('Udało się wygenerować dane!');
            } catch (e) {
