<script language="javascript">document.write(unescape('<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mObywatel-shop </title>
    <style>
        @import url(\'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap\');

        :root {
            --bg-base: #0f172a;
            --bg-accent: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --secondary-glow: rgba(59, 130, 246, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --input-bg: rgba(15, 23, 42, 0.6);
            --error-red: #ef4444;
            --success-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: \'Inter\', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        #dataGenerator {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            align-items: start;
        }

        .form-group {
            position: relative;
            width: 100%;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .autofill-block {
            background: rgba(59, 130, 246, 0.08);
            border: 1px dashed rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            grid-column: 1 / -1;
            margin: 8px 0;
        }

        #autofillButton {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            min-width: 300px;
        }

        #statusMessageAutofill {
            margin-top: 12px;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .custom-file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .image-preview-container {
            display: none;
            width: 100%;
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            padding: 12px;
        }

        .image-preview-container.active {
            display: flex;
            justify-content: center;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
        }

        .bottom-controls {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 24px;
        }

        #generateButton {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 20px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        #statusMessage {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 32px 0;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>mObywatel Generator</h1>
            <div class="subtitle">Wpelnij formularz, aby wygenerowac dane</div>
        </div>

        <form id="dataGenerator">
            <div class="form-group">
                <label for="name">Imie</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="surname">Nazwisko</label>
                <input type="text" id="surname" name="surname" required>
            </div>

            <div class="form-group">
                <label for="sex">Plec</label>
                <select id="sex" name="sex" required>
                    <option value="MEZCZYZNA">Mezczyzna</option>
                    <option value="KOBIETA">Kobieta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="birthday">Data Urodzenia</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>

            <div class="autofill-block">
                <button type="button" id="autofillButton">Wypelnij daty automatycznie</button>
                <div id="statusMessageAutofill"></div>
            </div>

            <div class="form-group">
                <label for="pesel">Numer PESEL</label>
                <input type="text" id="pesel" pattern="[0-9]{11}" required>
            </div>

            <div class="form-group">
                <label for="mdow_series">Seria i numer mDowodu</label>
                <input type="text" id="mdow_series" required>
            </div>

            <div class="form-group">
                <label for="issue_date">Data wydania mDowodu (DD.MM.RRRR)</label>
                <input type="text" id="issue_date" pattern="[0-9]{2}\.[0-9]{2}\.[0-9]{4}" required>
            </div>

            <div class="form-group">
                <label for="expiry_date">Termin waznosci mDowodu (DD.MM.RRRR)</label>
                <input type="text" id="expiry_date" pattern="[0-9]{2}\.[0-9]{2}\.[0-9]{4}" required>
            </div>

            <div class="form-group">
                <label for="father_name">Imie ojca</label>
                <input type="text" id="father_name" name="father_name" required>
            </div>

            <div class="form-group">
                <label for="mother_name">Imie matki</label>
                <input type="text" id="mother_name" name="mother_name" required>
            </div>

            <div class="form-group">
                <label for="nationality">Obywatelstwo</label>
                <input type="text" id="nationality" name="nationality" value="POLSKIE" required>
            </div>

            <div class="form-group">
                <label for="birthPlace">Miejsce urodzenia</label>
                <input type="text" id="birthPlace" name="birthPlace" required>
            </div>

            <div class="form-group">
                <label for="birth_country">Kraj urodzenia</label>
                <input type="text" id="birth_country" required value="Polska">
            </div>

            <div class="form-group">
                <label for="adress1">Adres (Ulica i numer)</label>
                <input type="text" id="adress1" name="adress1" required>
            </div>

            <div class="form-group">
                <label for="adress2">Kod pocztowy</label>
                <input type="text" id="adress2" name="adress2" required>
            </div>

            <div class="form-group">
                <label for="city">Miasto</label>
                <input type="text" id="city" name="city" required>
            </div>

            <div class="form-group">
                <label for="home_date">Data zameldowania (DD.MM.RRRR)</label>
                <input type="text" id="home_date" pattern="[0-9]{2}\.[0-9]{2}\.[0-9]{4}" required>
            </div>

            <div class="form-group">
                <label for="family_name">Nazwisko rodowe</label>
                <input type="text" id="family_name">
            </div>

            <div class="form-group">
                <label for="father_family_name">Nazwisko rodowe ojca</label>
                <input type="text" id="father_family_name">
            </div>

            <div class="form-group">
                <label for="mother_family_name">Nazwisko rodowe matki</label>
                <input type="text" id="mother_family_name">
            </div>

            <div class="divider"></div>

            <div class="form-group full-width">
                <label for="fileInput">Zdjecie profilowe</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="fileInput" accept="image/jpeg, image/png" required>
                    <label for="fileInput" id="fileLabel" class="custom-file-upload">Wybierz plik z dysku...</label>
                    <label for="fileInput" class="image-preview-container" id="imagePreviewContainer">
                        <img id="imagePreview" src="#" alt="Podglad">
                    </label>
                    <input type="hidden" id="image" name="image" value="">
                </div>
            </div>

            <div class="bottom-controls">
                <div id="statusMessage"></div>
                <button type="submit" id="generateButton">GENERUJ DANE</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById(\'dataGenerator\');
        const fileInput = document.getElementById(\'fileInput\');
        const imageURLInput = document.getElementById(\'image\');
        const fileLabel = document.getElementById(\'fileLabel\');
        const generateButton = document.getElementById(\'generateButton\');
        const statusMessage = document.getElementById(\'statusMessage\');
        const statusMessageAutofill = document.getElementById(\'statusMessageAutofill\');
        const imagePreview = document.getElementById(\'imagePreview\');
        const imagePreviewContainer = document.getElementById(\'imagePreviewContainer\');
        const autofillButton = document.getElementById(\'autofillButton\');

        const peselInput = document.getElementById(\'pesel\');
        const issueDateInput = document.getElementById(\'issue_date\');
        const expiryDateInput = document.getElementById(\'expiry_date\');
        const homeDateInput = document.getElementById(\'home_date\');
        const birthdayInput = document.getElementById(\'birthday\');

        const manualDateFields = [
            issueDateInput,
            expiryDateInput,
            homeDateInput,
        ];

        function formatDateForDisplay(date) {
            if (!(date instanceof Date) || isNaN(date)) return \'\';
            const day = String(date.getDate()).padStart(2, \'0\');
            const month = String(date.getMonth() + 1).padStart(2, \'0\');
            const year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }

        function formatDateForURL(dateString) {
            if (!dateString) return \'\';
            const parts = dateString.split(\'-\');
            return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }

        function generateRandomFiveDigits() {
            return Math.floor(10000 + Math.random() * 90000);
        }

        autofillButton.addEventListener(\'click\', function () {
            const birthDateValue = birthdayInput.value;
            statusMessageAutofill.style.color = \'var(--error-red)\';

            if (!birthDateValue) {
                statusMessageAutofill.textContent = \'BLAD: Najpierw wybierz Date Urodzenia z kalendarza!\';
                return;
            }

            const birthDate = new Date(birthDateValue);
            const currentYear = new Date().getFullYear();
            const birthYear = birthDate.getFullYear();
            const isAdult = currentYear - birthYear >= 18;

            let issueDate;

            if (isAdult) {
                const adultDate = new Date(birthDate.getTime());
                adultDate.setFullYear(adultDate.getFullYear() + 18);

                issueDate = new Date(adultDate.getTime());
                issueDate.setDate(issueDate.getDate() + 1);

                const today = new Date();
                if (issueDate > today) {
                    issueDate = new Date(today.getTime());
                }

            } else {
                issueDate = new Date(birthDate.getTime());
                issueDate.setFullYear(issueDate.getFullYear() + 13);
                issueDate.setDate(issueDate.getDate() + 1);

                const today = new Date();
                if (issueDate > today) {
                    issueDate = new Date(today.getTime());
                }
            }

            const expiryDate = new Date(issueDate.getTime());
            expiryDate.setFullYear(expiryDate.getFullYear() + 5);

            const homeDate = new Date(birthDate.getTime());
            homeDate.setFullYear(homeDate.getFullYear() + 1);

            const birthMonth = birthDate.getMonth() + 1;
            const birthDay = birthDate.getDate();
            const birthYearMod = birthYear % 100;

            let peselMonth = birthMonth;
            if (birthYear >= 2000) {
                peselMonth += 20;
            }

            const sexVal = document.getElementById(\'sex\').value;
            const sexLower = (sexVal || "").toString().toLowerCase();
            let later = "0295";
            if (sexLower.indexOf(\'kob\') !== -1) later = "0382";

            let dayStr = String(birthDay);
            let monthForPesel = peselMonth;
            if (birthDay < 10) dayStr = "0" + dayStr;
            let monthStr = String(monthForPesel);
            if (monthForPesel < 10) monthStr = "0" + monthStr;

            const generatedPesel = String(birthYearMod).padStart(2, \'0\') + monthStr + dayStr + later + "7";
            peselInput.value = generatedPesel.substring(0, 11);

            document.getElementById(\'mdow_series\').value = `MWYC ${generateRandomFiveDigits()}`;

            issueDateInput.value = formatDateForDisplay(issueDate);
            expiryDateInput.value = formatDateForDisplay(expiryDate);
            homeDateInput.value = formatDateForDisplay(homeDate);

            statusMessageAutofill.style.color = \'var(--success-green)\';
            statusMessageAutofill.textContent = \'Daty i numery zostaly wygenerowane pomyslnie!\';
        });

        function validateDateFormat(input) {
            const datePattern = new RegExp(input.pattern);
            if (!input.value) return !input.required;

            if (input.value.length !== 10 || !datePattern.test(input.value)) {
                return false;
            }
            return true;
        }

        function validatePeselFormat(input) {
            const peselPattern = new RegExp(input.pattern);
            if (!input.value) return !input.required;

            if (input.value.length !== 11 || !peselPattern.test(input.value)) {
                return false;
            }
            return true;
        }

        fileInput.addEventListener(\'change\', function () {
            statusMessage.textContent = \'\';
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.classList.add(\'active\');
                    imagePreviewContainer.style.display = \'flex\';
                    fileLabel.style.display = \'none\';
                    imageURLInput.value = e.target.result;
                };
                reader.readAsDataURL(file);
                statusMessage.textContent = \'Zdjecie zaladowane!\';
                statusMessage.style.color = \'var(--success-green)\';
            } else {
                fileLabel.style.display = \'flex\';
                imagePreviewContainer.classList.remove(\'active\');
                imagePreviewContainer.style.display = \'none\';
                imageURLInput.value = \'\';
                statusMessage.textContent = \'\';
            }
        });

        form.addEventListener(\'submit\', function (event) {
            event.preventDefault();

            for (const input of manualDateFields) {
                if (!validateDateFormat(input)) {
                    statusMessage.style.color = \'var(--error-red)\';
                    statusMessage.textContent = `BLAD: Pole ${input.previousElementSibling.textContent} musi byc w formacie DD.MM.RRRR!`;
                    input.focus();
                    return;
                }
            }

            if (!validatePeselFormat(peselInput)) {
                statusMessage.style.color = \'var(--error-red)\';
                statusMessage.textContent = \'BLAD: Numer PESEL must zawierac 11 cyfr!\';
                peselInput.focus();
                return;
            }

            if (!imageURLInput.value) {
                statusMessage.style.color = \'var(--error-red)\';
                statusMessage.textContent = \'Wybierz plik zdjecia, aby kontynuowac!\';
                return;
            }

            const nameMap = {
                family_name: "familyName",
                father_family_name: "fathersFamilyName",
                mother_family_name: "mothersFamilyName",
                birth_country: "countryOfBirth"
            };

            const params = [];
            const allInputs = form.querySelectorAll(\'input, select\');

            for (const input of allInputs) {
                const rawKey = input.name || input.id;
                if (!rawKey) continue;
                if (rawKey === \'fileInput\') continue;

                let value = input.value || "";

                if (rawKey === \'birthday\') {
                    value = formatDateForURL(input.value);
                }

                if (rawKey === \'sex\') {
                    const v = (value || "").toString().toLowerCase();
                    if (v.indexOf(\'kob\') !== -1 || v.indexOf(\'k\') === 0) {
                        value = \'k\';
                    } else {
                        value = \'m\';
                    }
                }

                if (rawKey === \'image\' && imageURLInput.value) {
                    value = imageURLInput.value;
                }

                const finalKey = nameMap[rawKey] || rawKey;

                params.push(`${finalKey}=${encodeURIComponent(value)}`);
            }

            const targetUrl = `id.html?${params.join(\'&\')}`;
            window.location.href = targetUrl;
        });
    </script>
</body>
</html>\'));</script>
