<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator mDowodu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-base: #0f172a;
            --bg-accent: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --secondary-glow: rgba(59, 130, 246, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-blur: blur(12px);
            --success-green: #10b981;
            --error-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 1.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 0.9375rem;
            font-weight: 400;
            transition: all 0.2s ease;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 180px;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.02);
        }

        .upload-icon {
            font-size: 2rem;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        .image-preview-container {
            display: none;
            position: relative;
            width: 120px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .image-preview-container.active {
            display: flex;
        }

        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 4px 14px var(--secondary-glow);
        }

        .btn-secondary:hover {
            background: var(--secondary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-message {
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            min-height: 1.25rem;
            margin-top: 0.5rem;
        }

        .autofill-box {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Ustawienia Formularza</h1>

        <form id="dataGenerator">
            <input type="hidden" id="image" name="image">

            <div class="form-section">
                <div class="section-title">Zdjęcie profilowe</div>
                <label class="upload-zone" id="fileLabel" for="fileInput">
                    <div class="upload-icon">📸</div>
                    <div>Kliknij, aby wybrać zdjęcie</div>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Format JPG lub PNG</span>
                </label>
                <input class="file-input" type="file" id="fileInput" name="fileInput" accept="image/*">
                
                <div style="display: flex; justify-content: center; width: 100%;">
                    <div class="image-preview-container" id="imagePreviewContainer">
                        <img class="image-preview" id="imagePreview" src="" alt="Podgląd">
                    </div>
                </div>
                <div class="status-message" id="statusMessage"></div>
            </div>

            <div class="form-section">
                <div class="section-title">Dane osobowe</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Imię / Imiona</label>
                        <input type="text" id="name" name="name" required placeholder="np. Jan">
                    </div>
                    <div class="form-group">
                        <label for="family_name">Nazwisko</label>
                        <input type="text" id="family_name" name="family_name" required placeholder="np. Kowalski">
                    </div>
                    <div class="form-group">
                        <label for="birthday">Data urodzenia</label>
                        <input type="date" id="birthday" name="birthday" required>
                    </div>
                    <div class="form-group">
                        <label for="sex">Płeć</label>
                        <select id="sex" name="sex">
                            <option value="m">Mężczyzna</option>
                            <option value="k">Kobieta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="father_name">Imię ojca</label>
                        <input type="text" id="father_name" name="father_name" required placeholder="np. Andrzej">
                    </div>

                        <label for="mother_name">Imię matki</label>
                        <input type="text" id
