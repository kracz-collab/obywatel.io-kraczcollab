<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Danych</title>
    </head>
<body>

    <form id="dataGenerator">
        <input type="text" id="name" name="name" placeholder="Imię">
        <input type="text" id="surname" name="surname" placeholder="Nazwisko">
        <input type="date" id="birthday" name="birthday">
        <input type="text" id="pesel" name="pesel" placeholder="PESEL">
        <button type="button" id="autofillButton">Uzupełnij automatycznie</button>
        <button type="submit">GENERUJ DANE</button>
    </form>

    <script>
        const form = document.getElementById('dataGenerator');
        const autofillButton = document.getElementById('autofillButton');

        // FUNKCJA AUTOMATYCZNEGO UZUPEŁNIANIA
        autofillButton.addEventListener('click', function() {
            const bDayInput = document.getElementById('birthday');
            if(!bDayInput.value) {
                alert('Najpierw wybierz datę urodzenia!');
                return;
            }
            
            const bDay = new Date(bDayInput.value);
            const year = bDay.getFullYear();
            const month = bDay.getMonth() + 1;
            const day = bDay.getDate();

            document.getElementById('pesel').value = String(year % 100).padStart(2, '0') + 
                                                   String(month + (year >= 2000 ? 20 : 0)).padStart(2, '0') + 
                                                   String(day).padStart(2, '0') + "12345";
            // Dodaj tutaj inne pola, jeśli potrzebujesz
        });

        // FUNKCJA GENEROWANIA I PRZEKIEROWANIA
        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const params = [];
            const allInputs = form.querySelectorAll('input, select');

            for (const input of allInputs) {
                if (!input.name) continue;
                
                let value = input.value || "";
                
                // Specjalne formatowanie dla daty
                if (input.id === 'birthday') {
                    const p = value.split('-');
                    value = `${p[2]}.${p[1]}.${p[0]}`;
                }

                params.push(`${input.name}=${encodeURIComponent(value)}`);
            }

            // Przekierowanie do id.html z danymi
            window.location.href = `id.html?${params.join('&')}`;
        });
    </script>
</body>
</html>
