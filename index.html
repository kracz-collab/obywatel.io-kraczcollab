<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Weryfikacja dostępu...</title>
    <script>
        // Dane projektu Supabase
        const SUPABASE_URL = "https://zuvzbxgtzwbcdkjjyzgg.supabase.co";
        const SUROWY_KLUCZ = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1dnpieGd0endiY2Rramp5emdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Njc0NTAsImV4cCI6MjA5NjE0MzQ1MH0.bLpNh9YZJ9xqLM08t4LW7uguV1eL-lth8tCfDRzgev8`;
        const SUPABASE_KEY = SUROWY_KLUCZ.replace(/\s/g, '');

        async function sprawdzDostep() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let token = urlParams.get('token');

                if (!token) {
                    token = localStorage.getItem('pwa_token');
                }

                if (!token) {
                    zablokujStrone("Brak tokenu dostępu. Kup produkt, aby uzyskać link.");
                    return;
                }

                // Zapytanie HTTP do bazy Supabase
                const url = `${SUPABASE_URL}/rest/v1/linki-dostepp?token=eq.${token}&select=*`;
                const odpowiedz = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Accept': 'application/json',
                        'Range-Unit': 'items',
                        'Range': '0-0'
                    }
                });

                if (!odpowiedz.ok) {
                    zablokujStrone(`Błąd połączenia z bazą danych! Status: ${odpowiedz.status}`);
                    return;
                }

                const dane = await odpowiedz.json();

                if (!dane || dane.length === 0) {
                    zablokujStrone("Nieprawidłowy lub nieaktywny bilet dostępu!");
                    return;
                }

                const rekord = dane[0];
                const czyJuzZalogowany = localStorage.getItem('pwa_zalogowany') === token;

                if (!czyJuzZalogowany) {
                    if (Number(rekord.uzyte_urzadzenia) >= Number(rekord.max_urzadzen)) {
                        zablokujStrone("Ten link osiągnął już limit zarejestrowanych urządzeń!");
                        return;
                    }

                    const urlUpdate = `${SUPABASE_URL}/rest/v1/linki-dostepp?token=eq.${token}`;
                    await fetch(urlUpdate, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify({ uzyte_urzadzenia: Number(rekord.uzyte_urzadzenia) + 1 })
                    });

                    localStorage.setItem('pwa_token', token);
                    localStorage.setItem('pwa_zalogowany', token);
                }

                // SPRAWDZENIE: Jeśli w adresie URL są parametry z konfiguratora (np. "name=" lub "image="), 
                // oznacza to, że użytkownik właśnie wygenerował dane i chce zobaczyć ekran wpisywania hasła.
                if (window.location.search.includes('name=') || window.location.search.includes('image=')) {
                    // Przekierowujemy na id.html i doklejamy CAŁĄ paczkę wygenerowanych danych z konfiguratora
                    window.location.href = "id.html" + window.location.search;
                } else {
                    // W przeciwnym wypadku (czyste wejście z tokenem) otwieramy sam konfigurator danych
                    window.location.href = "generator.html";
                }

            } catch (err) {
                zablokujStrone("Wystąpił błąd krytyczny: " + err.message);
            }
        }

        function zablokujStrone(komunikat) {
            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#111; color:#fff; font-family:sans-serif; text-align:center; padding:20px;">
                    <div>
                        <h1 style="color:#ff4a4a; font-size: 28px; margin-bottom: 10px;">Brak dostępu</h1>
                        <p style="color:#ccc; font-size: 16px; max-width: 400px; margin: 0 auto;">${komunikat}</p>
                    </div>
                </div>
            `;
        }

        window.onload = sprawdzDostep;
    </script>
</head>
<body style="background: #111; margin: 0;">
</body>
</html>
